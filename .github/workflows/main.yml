name: Shimul-XD-Translator-Bot

on:
  schedule:
    - cron: "0 */4 * * *" # প্রতি ৪ ঘণ্টা পর অটো রিস্টার্ট
  workflow_dispatch: # ম্যানুয়ালি স্টার্ট করার অপশন

concurrency:
  group: translator-bot
  cancel-in-progress: true # নতুন রান শুরু হলে আগেরটা অটো বন্ধ হয়ে যাবে

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Running Shimul XD Bot
        timeout-minutes: 235 # প্রায় ৪ ঘণ্টা চলবে
        run: python bot.py
