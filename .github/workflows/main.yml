name: Shimul-XD-Translator

on:
  schedule:
    - cron: "0 */4 * * *" # প্রতি ৪ ঘণ্টা পর অটোমেটিক চলবে
  workflow_dispatch: # ইচ্ছা করলে নিজে থেকেও স্টার্ট করা যাবে

concurrency:
  group: translator-group
  cancel-in-progress: true # এটি গুরুত্বপূর্ণ: নতুন রান শুরু হলে আগেরটা অটোমেটিক স্টপ হয়ে যাবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Premium Bot
        # ৪ ঘণ্টার কিছুটা কম সময় দিয়েছি যাতে পরের রান শুরু হওয়ার আগে এটি সেফলি ক্লোজ হয়
        timeout-minutes: 235 
        run: python bot.py
