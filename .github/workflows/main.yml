name: Premium-Translator-Action

on:
  schedule:
    - cron: "0 */4 * * *" # Auto restart every 4 hours
  workflow_dispatch: # Allow manual start

concurrency:
  group: translator-service
  cancel-in-progress: true # This kills the old bot before starting the new one

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Premium Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Shimul XD Translator
        timeout-minutes: 235
        run: python bot.py
