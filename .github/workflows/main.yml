name: Translator Bot Auto Restart

on:
  schedule:
    - cron: "0 */4 * * *" # প্রতি ৪ ঘণ্টা পর পর চলবে
  workflow_dispatch: # ম্যানুয়ালি চালানোর জন্য

concurrency:
  group: translator-bot
  cancel-in-progress: true # নতুন রান শুরু হলে পুরনোটা অটো বন্ধ হয়ে যাবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Translator Bot
        timeout-minutes: 235 # প্রায় ৩ ঘণ্টা ৫৫ মিনিট পর এটি টাইমআউট হবে যাতে পরবর্তী রান শুরু হতে পারে
        run: python bot.py
